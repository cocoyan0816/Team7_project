version: 2

models:
  - name: dim_client
    description: Dimension table containing client-level aggregated information, including session activity, order behavior, engagement metrics, and estimated purchase value.
    columns:
      - name: client_id
        description: Unique identifier for a client.
        tests:
          - unique
          - not_null

      - name: client_name
        description: Most recent known name of the client based on order history.

      - name: estimated_total_purchase_value
        description: Estimated total purchase value for the client based on item-level cart activity and latest observed prices.

      - name: first_order_at
        description: Timestamp of the client's first recorded order.

      - name: first_session_at
        description: Timestamp of the client's first recorded session.

      - name: latest_order_at
        description: Timestamp of the client's most recent recorded order.

      - name: latest_session_at
        description: Timestamp of the client's most recent recorded session.

      - name: shipping_state
        description: Most recent known shipping state of the client based on order history.

      - name: total_add_to_cart_quantity
        description: Total quantity of items the client added to cart across all sessions.

      - name: total_item_views
        description: Total number of item view events generated by the client.

      - name: total_orders
        description: Total number of distinct orders placed by the client.

      - name: total_page_views
        description: Total number of page view events generated by the client.

      - name: total_remove_from_cart_quantity
        description: Total quantity of items the client removed from cart across all sessions.

      - name: total_sessions
        description: Total number of distinct sessions associated with the client.

  - name: dim_item
    description: Dimension table containing item-level aggregated metrics, including view activity, cart interactions, and pricing information.
    columns:
      - name: item_name
        description: Name of the item.
        tests:
          - not_null

      - name: first_seen_at
        description: Timestamp when the item was first viewed.

      - name: latest_seen_at
        description: Timestamp when the item was most recently viewed.

      - name: price_per_unit
        description: Latest observed price per unit of the item.

      - name: total_item_views
        description: Total number of times the item was viewed.

      - name: total_add_to_cart_quantity
        description: Total quantity of the item added to cart.

      - name: total_remove_from_cart_quantity
        description: Total quantity of the item removed from cart.      

  - name: dim_employee
    description: Dimension table containing employee information, including personal details, employment status, and salary metrics.
    columns:
      - name: employee_id
        description: Unique identifier for an employee.
        tests:
          - unique
          - not_null

      - name: employee_name
        description: Name of the employee.

      - name: job_title
        description: Job title of the employee.

      - name: city
        description: City where the employee is located.

      - name: address
        description: Address of the employee.

      - name: hire_date
        description: Date when the employee was hired.

      - name: employment_end_date
        description: Date when the employee's employment ended, if applicable.

      - name: employment_status
        description: Current employment status of the employee.

      - name: is_active
        description: Indicator whether the employee is currently active (1 = active, 0 = inactive).

      - name: annual_salary
        description: Annual salary of the employee.

      - name: daily_salary_cost
        description: Daily salary cost derived from the annual salary.

- name: fact_order
  description: Fact table containing order-level transaction details, including client information, order timing, payment method, shipping details, refund/return status, and profitability metrics.
  columns:
       - name: order_id
      description: Unique identifier for the order.
      tests:
        - unique
        - not_null

    - name: session_id
      description: Unique identifier for the session associated with the order.

    - name: client_id
      description: Unique identifier for the client who placed the order.
      tests:
        - not_null

    - name: order_time
      description: Timestamp when the order was placed.
      tests:
        - not_null

    - name: client_name
      description: Name of the client associated with the order.

    - name: shipping_state
      description: State to which the order was shipped.

    - name: payment_method
      description: Payment method used for the order.

    - name: shipping_cost
      description: Shipping cost charged or incurred for the order.

    - name: tax_rate
      description: Tax rate applied to the order.

    - name: estimated_order_value
      description: Estimated total monetary value of the order.

    - name: is_returned
      description: Indicator showing whether the order was returned, where 1 means returned and 0 means not returned.

    - name: is_refunded
      description: Indicator showing whether the order was refunded, where 1 means refunded and 0 means not refunded.

    - name: returned_at_date
      description: Date when the order was returned, if applicable.

    - name: profit
      description: Profit generated from the order after accounting for relevant costs.
   
- name: fact_session
    description: Fact table containing session-level web activity, including session attributes, browsing behavior, cart interactions, order activity, and an estimated order value proxy.
    columns:
      - name: session_id
        description: Unique identifier for the session.
        tests:
          - unique
          - not_null

      - name: client_id
        description: Unique identifier for the client associated with the session.
        tests:
          - not_null

      - name: session_at
        description: Timestamp of the first recorded event for the session.

      - name: os
        description: Operating system used during the session.

      - name: ip
        description: IP address associated with the session.

      - name: has_page_view
        description: Indicator showing whether the session had at least one page view, where 1 means yes and 0 means no.

      - name: has_shop_page_view
        description: Indicator showing whether the session included at least one shop-related page view, where 1 means yes and 0 means no.

      - name: has_item_view
        description: Indicator showing whether the session had at least one item view, where 1 means yes and 0 means no.

      - name: has_add_to_cart
        description: Indicator showing whether at least one item was added to cart during the session, where 1 means yes and 0 means no.

      - name: has_remove_from_cart
        description: Indicator showing whether at least one item was removed from cart during the session, where 1 means yes and 0 means no.

      - name: has_order
        description: Indicator showing whether the session resulted in at least one order, where 1 means yes and 0 means no.

      - name: page_view_count
        description: Total number of page views recorded during the session.

      - name: item_view_count
        description: Total number of item views recorded during the session.

      - name: items_added_to_cart
        description: Total quantity of items added to cart during the session.

      - name: items_removed_from_cart
        description: Total quantity of items removed from cart during the session.

      - name: order_count
        description: Total number of distinct orders placed during the session.

      - name: first_order_at
        description: Timestamp of the first order placed during the session, if any.

      - name: estimated_order_value
        description: Estimated monetary value of items remaining in the cart during the session, calculated using net item quantities and latest observed item prices.


  - name: daily_finances
    description: Daily finance summary table containing daily revenue, cost, profit, refund, and return metrics.

    columns:
      - name: date
        description: Calendar date for the daily finance record.
        tests:
          - not_null
          - unique

      - name: daily_product_revenue
        description: Total product revenue generated on the date.
        tests:
          - not_null

      - name: daily_order_count
        description: Total number of orders placed on the date.
        tests:
          - not_null
      
      - name: returned_order_count
        description: Number of returned orders on the date.
        tests:
          - not_null

      - name: refunded_order_count
        description: Number of refunded orders on the date.
        tests:
          - not_null
      
      - name: estimated_return_value
        description: Estimated total value of returned orders for the date.
        tests:
          - not_null

      - name: estimated_refund_value
        description: Estimated total value of refunded orders for the date.
        tests:
          - not_null
    
      - name: other_expense_amount
        description: Total non-salary and non-shipping expenses recorded on the date.
        tests:
          - not_null

      - name: salary_cost_amount
        description: Total allocated salary cost for the date.
        tests:
          - not_null

      - name: shipping_cost_amount
        description: Total shipping cost incurred on the date.
        tests:
          - not_null
        
      - name: total_cost_amount
        description: Total cost incurred on the date, including salary, shipping, and other expenses.
        tests:
          - not_null

      - name: daily_profit
        description: Net profit for the date after subtracting cost amounts and accounting for refunds and returns.
        tests:
          - not_null










