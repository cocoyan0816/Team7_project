version: 2

models:
  - name: dim_client
    description: Dimension table containing client-level aggregated information, including session activity, order behavior, engagement metrics, and estimated purchase value.
    columns:
      - name: client_id
        description: Unique identifier for a client.
        tests:
          - unique
          - not_null

      - name: client_name
        description: Most recent known name of the client based on order history.

      - name: estimated_total_purchase_value
        description: Estimated total purchase value for the client based on item-level cart activity and latest observed prices.

      - name: first_order_at
        description: Timestamp of the client's first recorded order.

      - name: first_session_at
        description: Timestamp of the client's first recorded session.

      - name: latest_order_at
        description: Timestamp of the client's most recent recorded order.

      - name: latest_session_at
        description: Timestamp of the client's most recent recorded session.

      - name: shipping_state
        description: Most recent known shipping state of the client based on order history.

      - name: total_add_to_cart_quantity
        description: Total quantity of items the client added to cart across all sessions.

      - name: total_item_views
        description: Total number of item view events generated by the client.

      - name: total_orders
        description: Total number of distinct orders placed by the client.

      - name: total_page_views
        description: Total number of page view events generated by the client.

      - name: total_remove_from_cart_quantity
        description: Total quantity of items the client removed from cart across all sessions.

      - name: total_sessions
        description: Total number of distinct sessions associated with the client.

  - name: dim_item
    description: Dimension table containing item-level aggregated metrics, including view activity, cart interactions, and pricing information.
    columns:
      - name: item_name
        description: Name of the item.
        tests:
          - not_null

      - name: first_seen_at
        description: Timestamp when the item was first viewed.

      - name: latest_seen_at
        description: Timestamp when the item was most recently viewed.

      - name: price_per_unit
        description: Latest observed price per unit of the item.

      - name: total_item_views
        description: Total number of times the item was viewed.

      - name: total_add_to_cart_quantity
        description: Total quantity of the item added to cart.

      - name: total_remove_from_cart_quantity
        description: Total quantity of the item removed from cart.      

  - name: dim_employee
    description: Dimension table containing employee information, including personal details, employment status, and salary metrics.
    columns:
      - name: employee_id
        description: Unique identifier for an employee.
        tests:
          - unique
          - not_null

      - name: employee_name
        description: Name of the employee.

      - name: job_title
        description: Job title of the employee.

      - name: city
        description: City where the employee is located.

      - name: address
        description: Address of the employee.

      - name: hire_date
        description: Date when the employee was hired.

      - name: employment_end_date
        description: Date when the employee's employment ended, if applicable.

      - name: employment_status
        description: Current employment status of the employee.

      - name: is_active
        description: Indicator whether the employee is currently active (1 = active, 0 = inactive).

      - name: annual_salary
        description: Annual salary of the employee.

      - name: daily_salary_cost
        description: Daily salary cost derived from the annual salary.