version: 2

sources:
  - name: google_drive
    database: LOAD
    schema: GOOGLE_DRIVE
    config:
      loaded_at_field: _fivetran_synced
      freshness:
        warn_after:
          count: 1
          period: day
        error_after:
          count: 5
          period: day

    tables:
      - name: expenses
      - name: hr_joins
      - name: hr_quits
      - name: returns

  - name: web_schema
    database: LOAD
    schema: WEB_SCHEMA
    config:
      loaded_at_field: _fivetran_synced
      freshness:
        warn_after:
          count: 1
          period: day
        error_after:
          count: 5
          period: day
    tables:
      - name: item_views
      - name: orders
      - name: page_views
      - name: sessions